<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旧萤火 - 网址导航</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7FDBDA;
            --secondary: #FFB7B2;
            --text: #2D3436;
            --text-light: #636E72;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            color: var(--text);
            position: relative;
        }

        /* 壁纸层 */
        .wallpaper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg.jpeg') center/cover;
            z-index: -1;
        }

        /* 设置按钮 */
        .settings-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            background: transparent;
            border: none;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
            background: linear-gradient(135deg, #FF6B9D, #C44EE0, #7B68EE, #00D4FF);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .settings-btn:hover {
            transform: scale(1.1);
        }

        /* 主容器 */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 120px 24px 60px;
        }

        /* 标题 */
        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 300;
            background: linear-gradient(135deg, #FF6B9D 0%, #C44EE0 25%, #7B68EE 50%, #00D4FF 75%, #00F5A0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            background: linear-gradient(90deg, #FF9A9E 0%, #FECFEF 25%, #A18CD1 50%, #FBC2EB 75%, #A6C1EE 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 0.95rem;
            margin-top: 6px;
        }

        /* 搜索框 */
        .search-box {
            position: relative;
            max-width: 560px;
            margin: 0 auto 50px;
        }

        .search-box::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #FF6B9D, #C44EE0, #7B68EE, #00D4FF, #00F5A0);
            transition: width 0.3s;
            border-radius: 1px;
        }

        .search-box:hover::after {
            width: 80%;
        }

        .search-box:focus-within::after {
            width: 80%;
        }

        .search-input {
            width: 100%;
            padding: 16px 130px 16px 24px;
            border: none;
            border-radius: 0;
            font-size: 1rem;
            background: transparent;
            color: #fff;
            outline: none;
            transition: all 0.3s;
            background: linear-gradient(90deg, #FF6B9D, #C44EE0, #7B68EE, #00D4FF, #00F5A0);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-input::placeholder {
            background: linear-gradient(90deg, #FF9A9E, #FECFEF, #A6C1EE);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.8;
        }

        .search-select {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
            padding: 8px;
            border-radius: 8px;
            background: linear-gradient(90deg, #FF9A9E, #C44EE0, #7B68EE);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-select option {
            background: rgba(30, 30, 30, 0.95);
            -webkit-text-fill-color: #fff;
            color: #fff;
        }

        .search-select:hover {
            opacity: 0.8;
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 42px;
            height: 42px;
            background: transparent;
            border: none;
            border-radius: 50%;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #FF6B9D, #C44EE0, #7B68EE);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-btn:hover {
            transform: translateY(-50%) scale(1.1);
        }

        /* 图标网格 */
        .icons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: 20px;
            justify-items: center;
        }

        .icon-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .icon-item:hover {
            transform: translateY(-4px);
        }

        .icon-item:hover .icon-circle {
            transform: scale(1.1);
        }

        .icon-circle {
            width: auto;
            min-width: 64px;
            height: 64px;
            padding: 0 16px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 300;
            margin-bottom: 0;
            transition: all 0.3s;
            background: transparent;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
        }

        /* 删除按钮 */
        .delete-btn {
            position: absolute;
            top: -6px;
            right: -6px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #ff6b6b;
            color: white;
            border: none;
            font-size: 0.8rem;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: #ee5a5a;
            transform: scale(1.1);
        }

        /* 添加按钮 */
        .add-icon .icon-circle {
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
        }

        .add-icon:hover .icon-circle {
            transform: scale(1.1);
        }

        /* 设置面板 */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -420px;
            width: 380px;
            max-width: 90vw;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding: 30px;
            transition: right 0.3s;
            z-index: 200;
            overflow-y: auto;
            box-shadow: -4px 0 30px rgba(0, 0, 0, 0.1);
        }

        .settings-panel.open {
            right: 0;
        }

        .settings-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 150;
        }

        .settings-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .panel-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eee;
            color: var(--text);
        }

        .setting-group {
            margin-bottom: 28px;
        }

        .setting-label {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 12px;
            font-weight: 500;
        }

        /* 壁纸选择 */
        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .wallpaper-item {
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            border: 3px solid transparent;
            transition: all 0.3s;
        }

        .wallpaper-item:hover {
            transform: scale(1.03);
        }

        .wallpaper-item.active {
            border-color: var(--primary);
        }

        .wallpaper-default { background: url('bg.jpeg') center/cover; }
        .wallpaper-ocean { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .wallpaper-sunset { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .wallpaper-forest { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        .wallpaper-sky { background: linear-gradient(135deg, #89CFF0 0%, #B8D4E3 100%); }
        .wallpaper-lavender { background: linear-gradient(135deg, #E6E6FA 0%, #DDA0DD 100%); }

        .btn {
            width: 100%;
            padding: 12px;
            background: rgba(127, 219, 218, 0.15);
            border: 1px solid rgba(127, 219, 218, 0.3);
            border-radius: 10px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .btn:hover {
            background: rgba(127, 219, 218, 0.25);
        }

        /* 搜索引擎设置 */
        .engine-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .engine-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(0,0,0,0.03);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .engine-item:hover {
            background: rgba(127, 219, 218, 0.15);
        }

        .engine-item.active {
            background: rgba(127, 219, 218, 0.25);
        }

        .engine-item input[type="radio"] {
            accent-color: var(--primary);
        }

        .engine-item span {
            font-size: 0.9rem;
        }

        .custom-engine {
            margin-top: 12px;
        }

        .custom-engine input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-top: 6px;
            outline: none;
        }

        .custom-engine input:focus {
            border-color: var(--primary);
        }

        .hint {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 4px;
        }

        /* 温馨语 */
        .daily-quote {
            position: fixed;
            left: 24px;
            top: 30%;
            max-width: 200px;
            padding: 20px;
            z-index: 50;
            text-align: center;
        }

        .quote-icon {
            font-size: 1.5rem;
            margin-bottom: 12px;
        }

        .quote-text {
            font-size: 0.9rem;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .quote-date {
            font-size: 0.8rem;
            color: #fff;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
            font-weight: 300;
        }

        @media (max-width: 1200px) {
            .daily-quote {
                display: none;
            }
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .container {
                padding: 80px 16px 40px;
            }

            .logo {
                font-size: 1.8rem;
            }

            .icons-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 16px 12px;
            }

            .icon-circle {
                width: auto;
                min-width: 56px;
                height: 56px;
                padding: 0 12px;
                font-size: 0.9rem;
            }

            .icon-circle {
                width: 56px;
                height: 56px;
                font-size: 1.5rem;
            }

            .icon-circle {
                width: auto;
                min-width: 56px;
                height: 56px;
                padding: 0 12px;
                font-size: 0.9rem;
            }

            .search-input {
                padding: 14px 110px 14px 18px;
                font-size: 0.9rem;
            }
        }
    </style></style>
</head>
<body>
    <div class="wallpaper" id="wallpaper"></div>

    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>

    <!-- 温馨语 -->
    <div class="daily-quote">
        <div class="quote-icon">✨</div>
        <div class="quote-text" id="quoteText">愿你的每一天都充满阳光</div>
        <div class="quote-date" id="quoteDate"></div>
    </div>

    <div class="container">
        <div class="header">
            <h1 class="logo">✨ 旧萤火</h1>
            <p class="subtitle">点亮每一个常用的角落</p>
        </div>

        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索或输入网址...">
            <select class="search-select" id="engineSelect">
                <option value="baidu" selected>百度</option>
                <option value="google">Google</option>
                <option value="bing">Bing</option>
                <option value="sougou">搜狗</option>
                <option value="zhihu">知乎</option>
                <option value="weibo">微博</option>
                <option value="bilibili">B站</option>
                <option value="taobao">淘宝</option>
            </select>
            <button class="search-btn" onclick="handleSearch()">→</button>
        </div>

        <div class="icons-grid" id="iconsGrid"></div>
    </div>

    <div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()"></div>

    <div class="settings-panel" id="settingsPanel">
        <h2 class="panel-title">⚙️ 设置</h2>

        <div class="setting-group">
            <div class="setting-label">🖼️ 背景壁纸</div>
            <div class="wallpaper-grid">
                <div class="wallpaper-item wallpaper-default active" data-wp="default" onclick="setWallpaper(this)"></div>
                <div class="wallpaper-item wallpaper-ocean" data-wp="ocean" onclick="setWallpaper(this)"></div>
                <div class="wallpaper-item wallpaper-sunset" data-wp="sunset" onclick="setWallpaper(this)"></div>
                <div class="wallpaper-item wallpaper-forest" data-wp="forest" onclick="setWallpaper(this)"></div>
                <div class="wallpaper-item wallpaper-sky" data-wp="sky" onclick="setWallpaper(this)"></div>
                <div class="wallpaper-item wallpaper-lavender" data-wp="lavender" onclick="setWallpaper(this)"></div>
            </div>
            <button class="btn" onclick="document.getElementById('wallpaperInput').click()">📷 上传自定义壁纸</button>
            <input type="file" id="wallpaperInput" accept="image/*" style="display:none" onchange="uploadWallpaper(event)">
        </div>

        <div class="setting-group">
            <div class="setting-label">🔍 搜索引擎</div>
            <div class="engine-list" id="engineList">
                <label class="engine-item active">
                    <input type="radio" name="engine" value="baidu" checked>
                    <span>百度</span>
                </label>
                <label class="engine-item">
                    <input type="radio" name="engine" value="google">
                    <span>Google</span>
                </label>
                <label class="engine-item">
                    <input type="radio" name="engine" value="bing">
                    <span>Bing</span>
                </label>
                <label class="engine-item">
                    <input type="radio" name="engine" value="sougou">
                    <span>搜狗</span>
                </label>
                <label class="engine-item">
                    <input type="radio" name="engine" value="zhihu">
                    <span>知乎</span>
                </label>
                <label class="engine-item">
                    <input type="radio" name="engine" value="weibo">
                    <span>微博</span>
                </label>
                <label class="engine-item">
                    <input type="radio" name="engine" value="bilibili">
                    <span>B站</span>
                </label>
                <label class="engine-item">
                    <input type="radio" name="engine" value="taobao">
                    <span>淘宝</span>
                </label>
            </div>
            <div class="custom-engine">
                <div class="setting-label" style="margin-top: 12px;">添加自定义搜索引擎</div>
                <input type="text" id="customEngineName" placeholder="名称 (如: DuckDuckGo)">
                <input type="text" id="customEngineUrl" placeholder="搜索URL (用 %s 代替关键词)">
                <p class="hint">例如: https://duckduckgo.com/?q=%s</p>
                <button class="btn" onclick="addCustomEngine()">添加搜索引擎</button>
            </div>
        </div>

        <div class="setting-group">
            <div class="setting-label">💾 数据管理</div>
            <button class="btn" onclick="exportData()">📤 导出配置</button>
            <button class="btn" onclick="document.getElementById('importInput').click()">📥 导入配置</button>
            <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
            <button class="btn btn-danger" onclick="resetData()" style="background: rgba(255, 107, 107, 0.15); border-color: rgba(255, 107, 107, 0.3);">🔄 恢复默认设置</button>
        </div>
    </div>

    <script>
        const defaultIcons = [
            { name: '爱奇艺', url: 'https://www.iqiyi.com' },
            { name: '腾讯视频', url: 'https://v.qq.com' },
            { name: '优酷', url: 'https://www.youku.com' },
            { name: 'B站', url: 'https://www.bilibili.com' },
            { name: 'YouTube', url: 'https://www.youtube.com' },
            { name: '微博', url: 'https://www.weibo.com' },
            { name: '斗鱼', url: 'https://www.douyu.com' }
        ];

        const defaultEngines = {
            baidu: { name: '百度', url: 'https://www.baidu.com/s?wd=%s' },
            google: { name: 'Google', url: 'https://www.google.com/search?q=%s' },
            bing: { name: 'Bing', url: 'https://www.bing.com/search?q=%s' },
            sougou: { name: '搜狗', url: 'https://www.sogou.com/web?query=%s' },
            zhihu: { name: '知乎', url: 'https://www.zhihu.com/search?type=content&q=%s' },
            weibo: { name: '微博', url: 'https://s.weibo.com/weibo?q=%s' },
            bilibili: { name: 'B站', url: 'https://search.bilibili.com/all?keyword=%s' },
            taobao: { name: '淘宝', url: 'https://s.taobao.com/search?q=%s' }
        };

        const wallpapers = {
            default: "url('bg.jpeg')",
            ocean: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
            sunset: 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
            forest: 'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)',
            sky: 'linear-gradient(135deg, #89CFF0 0%, #B8D4E3 100%)',
            lavender: 'linear-gradient(135deg, #E6E6FA 0%, #DDA0DD 100%)'
        };

        // 加载设置
        function loadSettings() {
            const saved = localStorage.getItem('jiuyehuo-settings');
            if (saved) {
                const settings = JSON.parse(saved);
                
                // 加载壁纸
                if (settings.wallpaper) {
                    applyWallpaper(settings.wallpaper);
                }
                
                // 加载图标
                if (settings.icons && settings.icons.length > 0) {
                    renderIcons(settings.icons);
                } else {
                    renderIcons(defaultIcons);
                }
                
                // 加载搜索引擎
                const engines = settings.engines || defaultEngines;
                const currentEngine = settings.currentEngine || 'google';
                
                renderEngines(engines);
                updateEngineSelect(engines, currentEngine);
                
                // 更新设置面板中的选中状态
                document.querySelectorAll('input[name="engine"]').forEach(radio => {
                    radio.checked = radio.value === currentEngine;
                    if (radio.checked) {
                        radio.parentElement.classList.add('active');
                    } else {
                        radio.parentElement.classList.remove('active');
                    }
                });
            } else {
                renderIcons(defaultIcons);
                renderEngines(defaultEngines);
                updateEngineSelect(defaultEngines, 'baidu');
            }
        }

        // 应用壁纸
        function applyWallpaper(wp) {
            const wallpaper = document.getElementById('wallpaper');
            if (wp.startsWith('http') || wp.startsWith('data:')) {
                wallpaper.style.background = `url(${wp}) center/cover`;
            } else if (wallpapers[wp]) {
                wallpaper.style.background = wallpapers[wp];
            }
            
            document.querySelectorAll('.wallpaper-item').forEach(item => {
                item.classList.toggle('active', item.dataset.wp === wp);
            });
        }

        // 设置壁纸
        function setWallpaper(el) {
            const wp = el.dataset.wp;
            applyWallpaper(wp);
            saveSettings();
        }

        // 上传壁纸
        function uploadWallpaper(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    applyWallpaper(e.target.result);
                    const settings = getSettings();
                    settings.wallpaper = e.target.result;
                    localStorage.setItem('jiuyehuo-settings', JSON.stringify(settings));
                };
                reader.readAsDataURL(file);
            }
        }

        // 渲染图标
        function renderIcons(icons) {
            const grid = document.getElementById('iconsGrid');
            grid.innerHTML = '';
            
            icons.forEach((icon, index) => {
                const item = document.createElement('a');
                item.className = 'icon-item';
                item.href = icon.url;
                item.target = '_blank';
                
                item.innerHTML = `
                    <button class="delete-btn" onclick="deleteIcon(event, ${index})">×</button>
                    <div class="icon-circle">${icon.name}</div>
                `;
                grid.appendChild(item);
            });
            
            // 添加按钮
            const addBtn = document.createElement('div');
            addBtn.className = 'icon-item add-icon';
            addBtn.onclick = addIcon;
            addBtn.innerHTML = `
                <div class="icon-circle">+ 添加</div>
            `;
            grid.appendChild(addBtn);
        }

        // 添加图标
        function addIcon() {
            const url = prompt('输入网址:', 'https://');
            if (!url) return;
            
            const name = prompt('输入名称:');
            if (!name) return;
            
            const settings = getSettings();
            if (!settings.icons) settings.icons = [...defaultIcons];
            settings.icons.push({ name, url });
            localStorage.setItem('jiuyehuo-settings', JSON.stringify(settings));
            
            renderIcons(settings.icons);
        }

        // 删除图标
        function deleteIcon(event, index) {
            event.preventDefault();
            event.stopPropagation();
            
            if (confirm('确定删除这个网站吗？')) {
                const settings = getSettings();
                settings.icons.splice(index, 1);
                localStorage.setItem('jiuyehuo-settings', JSON.stringify(settings));
                renderIcons(settings.icons);
            }
        }

        // 渲染搜索引擎选项
        function renderEngines(engines) {
            const list = document.getElementById('engineList');
            list.innerHTML = '';
            
            Object.entries(engines).forEach(([key, engine]) => {
                const item = document.createElement('label');
                item.className = 'engine-item';
                item.innerHTML = `
                    <input type="radio" name="engine" value="${key}">
                    <span>${engine.name}</span>
                `;
                list.appendChild(item);
            });
            
            // 绑定事件
            document.querySelectorAll('input[name="engine"]').forEach(radio => {
                radio.addEventListener('change', function() {
                    document.querySelectorAll('.engine-item').forEach(item => item.classList.remove('active'));
                    this.parentElement.classList.add('active');
                    
                    const settings = getSettings();
                    settings.currentEngine = this.value;
                    localStorage.setItem('jiuyehuo-settings', JSON.stringify(settings));
                    
                    updateEngineSelect(settings.engines, this.value);
                });
            });
        }

        // 更新搜索框下拉
        function updateEngineSelect(engines, currentKey) {
            const select = document.getElementById('engineSelect');
            select.innerHTML = '';
            
            Object.entries(engines).forEach(([key, engine]) => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = engine.name;
                option.selected = key === currentKey;
                select.appendChild(option);
            });
        }

        // 添加自定义搜索引擎
        function addCustomEngine() {
            const name = document.getElementById('customEngineName').value.trim();
            const url = document.getElementById('customEngineUrl').value.trim();
            
            if (!name || !url) {
                alert('请填写完整信息');
                return;
            }
            
            if (!url.includes('%s')) {
                alert('URL需要包含 %s 作为搜索关键词占位符');
                return;
            }
            
            const settings = getSettings();
            if (!settings.engines) settings.engines = { ...defaultEngines };
            
            const key = 'custom_' + Date.now();
            settings.engines[key] = { name, url };
            settings.currentEngine = key;
            localStorage.setItem('jiuyehuo-settings', JSON.stringify(settings));
            
            renderEngines(settings.engines);
            updateEngineSelect(settings.engines, key);
            
            document.getElementById('customEngineName').value = '';
            document.getElementById('customEngineUrl').value = '';
            
            alert('添加成功！');
        }

        // 搜索功能
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleSearch();
        });

        document.getElementById('engineSelect').addEventListener('change', function() {
            const settings = getSettings();
            settings.currentEngine = this.value;
            if (!settings.engines) {
                settings.engines = { ...defaultEngines };
            }
            localStorage.setItem('jiuyehuo-settings', JSON.stringify(settings));
            
            // 同步更新设置面板中的选中状态
            document.querySelectorAll('input[name="engine"]').forEach(radio => {
                radio.checked = radio.value === this.value;
                if (radio.checked) {
                    radio.parentElement.classList.add('active');
                } else {
                    radio.parentElement.classList.remove('active');
                }
            });
        });

        function handleSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            
            // 判断是否为网址
            if (query.includes('.') && !query.includes(' ')) {
                let url = query;
                if (!url.startsWith('http')) url = 'https://' + url;
                window.open(url, '_blank');
                return;
            }
            
            // 使用选择的搜索引擎
            const settings = getSettings();
            const engines = settings.engines || defaultEngines;
            const currentKey = settings.currentEngine || 'baidu';
            const engine = engines[currentKey];
            
            if (engine) {
                const searchUrl = engine.url.replace('%s', encodeURIComponent(query));
                window.open(searchUrl, '_blank');
            }
        }

        // 获取设置
        function getSettings() {
            const saved = localStorage.getItem('jiuyehuo-settings');
            return saved ? JSON.parse(saved) : { icons: [...defaultIcons], engines: { ...defaultEngines }, currentEngine: 'baidu' };
        }

        // 保存设置
        function saveSettings() {
            const settings = getSettings();
            const activeWp = document.querySelector('.wallpaper-item.active');
            if (activeWp) {
                settings.wallpaper = activeWp.dataset.wp;
            }
            localStorage.setItem('jiuyehuo-settings', JSON.stringify(settings));
        }

        // 导出配置
        function exportData() {
            const settings = localStorage.getItem('jiuyehuo-settings');
            const blob = new Blob([settings], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'jiuyehuo-config.json';
            a.click();
        }

        // 导入配置
        function importData(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const settings = JSON.parse(e.target.result);
                        localStorage.setItem('jiuyehuo-settings', JSON.stringify(settings));
                        loadSettings();
                        alert('导入成功！');
                    } catch (err) {
                        alert('配置文件格式错误');
                    }
                };
                reader.readAsText(file);
            }
        }

        // 切换设置面板
        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('open');
            document.getElementById('settingsOverlay').classList.toggle('open');
        }

        // 恢复默认设置
        function resetData() {
            if (confirm('确定要恢复默认设置吗？这将清除所有自定义内容。')) {
                localStorage.removeItem('jiuyehuo-settings');
                location.reload();
            }
        }

        // 温馨语列表
        const quotes = [
            "愿你的每一天都充满阳光 ☀️",
            "生活不止眼前的苟且，还有诗和远方 🌸",
            "保持热爱，奔赴山海 🌊",
            "每一个清晨都是新的开始 🌅",
            "愿你眼里有光，心中有爱 💫",
            "温柔半两，从容一生 🌿",
            "今日事今日毕，明日事明日愁 🍃",
            "把喜欢的事情做到极致，便是价值 ✨",
            "简单的生活，才是最真实的生活 🏠",
            "愿你成为自己的太阳，无需借谁的光 🌞",
            "慢慢来，比较快 🐢",
            "世界那么大，我想去看看 🌍",
            "心若向阳，无畏悲伤 🌻",
            "生活明朗，万物可爱 🌈",
            "所有失去的，都会以另一种方式归来 🦋",
            "愿你遍历山河，觉得人间值得 🏔️",
            "熬过无人问津的日子，才有诗和远方 📖",
            "努力的意义在于，看到更大的世界 🗺️",
            "生活原本沉闷，但跑起来就有风 🏃",
            "愿你保持善良，但要有锋利边缘 ⚔️",
            "每一段时光都值得被珍藏 📷",
            "不必仰望别人，自己亦是风景 🌸",
            "最好的状态是未来可期 🌟",
            "愿所有美好如期而至 🎁",
            "做自己的英雄，不借谁的光 💪",
            "努力成为更好的人 🌱",
            "心怀浪漫宇宙，也珍惜人间日常 🌌",
            "愿你眼里有星辰大海 👀",
            "温柔且坚定，知足且上进 💎",
            "向阳而生，逐光而行 🌻",
            "生活总是让我们遍体鳞伤，但后来，那些受伤的地方一定会变成我们最强壮的地方 💪"
        ];

        // 根据日期获取温馨语
        function getDailyQuote() {
            const today = new Date();
            const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / (1000 * 60 * 60 * 24));
            const index = dayOfYear % quotes.length;
            return quotes[index];
        }

        // 更新温馨语和时间
        function updateQuote() {
            const quoteText = document.getElementById('quoteText');
            const quoteDate = document.getElementById('quoteDate');
            
            quoteText.textContent = getDailyQuote();
            updateDateTime();
            
            // 每秒更新时间
            setInterval(updateDateTime, 1000);
        }

        // 更新时间
        function updateDateTime() {
            const quoteDate = document.getElementById('quoteDate');
            const now = new Date();
            
            const year = now.getFullYear().toString().slice(-2);
            const month = now.getMonth() + 1;
            const day = now.getDate();
            const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const weekday = weekdays[now.getDay()];
            
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            
            quoteDate.textContent = `${year}年${month}月${day}日 ${weekday} ${hours}:${minutes}:${seconds}`;
        }

        // 初始化
        loadSettings();
        updateQuote();
    </script>
</body>
